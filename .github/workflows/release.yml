name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fat jar
        run: ./gradlew clean shadowJar --console=plain

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/dbeaver-qdrant-plugin-1.0-SNAPSHOT.jar
          generate_release_notes: true
